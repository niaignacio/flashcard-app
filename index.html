<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Study Cards</title>

  <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

  <header>
    <h1>Study Cards</h1>
  </header>

  <main>

    <section id="setList"></section>

    <section id="studyView" class="hidden">

      <button id="backBtn">
        ← Back
      </button>

      <h2 id="setTitle"></h2>

      <div id="flashcard">
        <div id="cardText"></div>
      </div>

      <div class="controls">

        <button id="prevBtn">
          Previous
        </button>

        <span id="counter"></span>

        <button id="nextBtn">
          Next
        </button>

      </div>

    </section>

  </main>

  <script src="assets/app.js"></script>

</body>

</html>
